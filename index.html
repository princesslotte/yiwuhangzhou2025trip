<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Yiwu & Hangzhou Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Import Noto Sans KR as a fallback for Seoul fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                bg: '#f8e8c1',
                text: '#594a40',
                card: '#ffffff',
                accent: '#8c735a' 
              }
            },
            boxShadow: {
              'journal': '4px 4px 0px 0px rgba(89, 74, 64, 0.1)',
              'soft': '0 10px 40px -10px rgba(89, 74, 64, 0.15)',
              'inner': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.05)'
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #f8e8c1;
        color: #594a40;
        -webkit-tap-highlight-color: transparent;
        /* Fixed Background Pattern */
        background-image: radial-gradient(#8c735a 1.5px, transparent 1.5px);
        background-size: 24px 24px;
        background-attachment: fixed;
        /* Typography for readability */
        font-size: 16px;
        line-height: 1.6;
      }
      
      /* Font settings based on Language */
      .font-zh {
        font-family: "Microsoft JhengHei", "Microsoft YaHei", "Noto Sans TC", sans-serif;
      }
      
      .font-ko {
        font-family: "SeoulNamsan", "SeoulHangang", "Noto Sans KR", sans-serif;
      }

      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.32.0",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.556.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "vite": "https://esm.sh/vite@^7.2.7"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
